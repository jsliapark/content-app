server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA: serve static assets, fall back to index.html for client routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → uvicorn (port 8000) ─────────────────────────────────────
    location /api/ {
        # gzip must be off — compression buffers the response and kills SSE streaming
        gzip off;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable all buffering so events stream immediately
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     600s;
        proxy_send_timeout     600s;
        add_header             X-Accel-Buffering "no";

        # Keep-alive for long-lived SSE connections
        proxy_set_header       Connection '';
        chunked_transfer_encoding on;
    }

    # ── Health check endpoint ────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
