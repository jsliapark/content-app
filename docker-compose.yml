services:
  app:
    build: .
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      # Override the default relative path so SQLite persists to the volume
      DATABASE_URL: sqlite:////data/content_app.db
    volumes:
      - app_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  app_data:
